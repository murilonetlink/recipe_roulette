name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flet supabase

      - name: Inject Secrets into Python
        # Criamos um ficheiro normal em vez de um .env!
        run: |
          echo 'SUPABASE_URL = "${{ secrets.SUPABASE_URL }}"' > core/env_vars.py
          echo 'SUPABASE_KEY = "${{ secrets.SUPABASE_KEY }}"' >> core/env_vars.py

      - name: Build APK
        run: yes | flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RecipeRoulette-APK
          path: build/apk/**/*.apk
